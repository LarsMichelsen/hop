name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the project's minimum supported interpreter (requires-python >= 3.12).
  UV_PYTHON: "3.12"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # The same four checks prek runs on commit: ruff format, ruff check,
      # basedpyright (strict), and pytest with the coverage threshold.
      - name: Run all checks
        run: uv run prek run --all-files --show-diff-on-failure
