version: 2
updates:
  # Keep Python dependencies (pyproject.toml / uv.lock) up to date.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    # Batch all bumps into a single weekly PR to keep noise down.
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Keep GitHub Actions (.github/workflows) up to date so action runtime
  # deprecations (e.g. Node 20 -> 24) are surfaced as PRs automatically.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
