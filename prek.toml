# Pre-commit hooks managed by prek (https://prek.j178.dev).
# Mirrors the four checks documented in docs/DEVELOPMENT.md so that
# `prek run --all-files` is equivalent to the one-liner there.

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
entry = "uv run ruff format"
language = "system"
types_or = ["python", "pyi"]

[[repos.hooks]]
id = "ruff-check"
name = "ruff check --fix"
entry = "uv run ruff check --fix"
language = "system"
types_or = ["python", "pyi"]

[[repos.hooks]]
id = "basedpyright"
name = "basedpyright (strict)"
entry = "uv run python -m basedpyright"
language = "system"
types_or = ["python", "toml"]
pass_filenames = false

[[repos.hooks]]
id = "pytest"
name = "pytest (with coverage threshold)"
entry = "uv run python -m pytest"
language = "system"
pass_filenames = false
always_run = true
